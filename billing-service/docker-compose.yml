services:
  app:
    build: .
    image: billing-service
    container_name: billing-service
    ports:
      - "4001:4001"
      - "9001:9001"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge
    external: true